databases:
  - name: self-driving-rl-postgres
    plan: basic-256mb
    databaseName: self_driving_rl
    user: rl_user

services:
  - type: keyvalue
    name: self-driving-rl-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: self-driving-rl-backend
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: self-driving-rl-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: self-driving-rl-redis
          property: connectionString
      - key: TRAINER_CONTROL_MODE
        value: redis
      - key: AUTO_CREATE_TABLES
        value: false
      - key: CHECKPOINT_DIR
        value: /app/checkpoints
      - key: FRAME_STORE_STEP_INTERVAL
        value: 50
      - key: MAX_STORED_FRAMES
        value: 1000

  - type: worker
    name: self-driving-rl-trainer
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python trainer_worker.py
    envVars:
      - key: BACKEND_INTERNAL_HOSTPORT
        fromService:
          type: web
          name: self-driving-rl-backend
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: self-driving-rl-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: self-driving-rl-redis
          property: connectionString
      - key: CHECKPOINT_DIR
        value: /app/checkpoints
      - key: CHECKPOINT_INTERVAL
        value: 25
      - key: EXPERIMENT_TRACKER
        value: none

  - type: web
    name: self-driving-rl-frontend
    runtime: docker
    plan: starter
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: REACT_APP_BACKEND
        sync: false
      - key: REACT_APP_WS_URL
        sync: false
